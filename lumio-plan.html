<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lumio — Your Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Instrument+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#0e0d0c;--bg:#fdfaf5;--white:#ffffff;--rule:#e8e3db;--soft:#f5f1eb;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Instrument Sans',sans-serif;font-weight:300;min-height:100vh;}

/* NAV */
.top{padding:1.6rem 4rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--rule);position:sticky;top:0;background:rgba(253,250,245,0.96);backdrop-filter:blur(12px);z-index:10;}
.logo{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:500;color:var(--ink);text-decoration:none;}
.top-right{display:flex;gap:1.8rem;align-items:center;}
.top-link{font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink);opacity:0.3;text-decoration:none;transition:opacity .2s;background:none;border:none;cursor:pointer;font-family:'Instrument Sans',sans-serif;}
.top-link:hover{opacity:1;}
.top-link.primary{opacity:1;border:1px solid var(--ink);padding:.4rem 1rem;}
.top-link.primary:hover{background:var(--ink);color:var(--bg);}

/* LOADING SCREEN */
.loading-screen{min-height:calc(100vh - 65px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.4rem;}
.spinner{width:32px;height:32px;border:1px solid var(--rule);border-top-color:var(--ink);border-radius:50%;animation:spin 1s linear infinite;}
.load-label{font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--ink);opacity:0.3;}
.load-msg{font-family:'Playfair Display',serif;font-style:italic;font-size:1rem;color:var(--ink);opacity:0.4;}
@keyframes spin{to{transform:rotate(360deg);}}

/* PLAN LAYOUT */
.plan{display:none;animation:rise .5s ease both;}
.plan.show{display:block;}

/* HEADER */
.plan-header{padding:3.5rem 4rem 0;}
.plan-eyebrow{font-size:0.58rem;letter-spacing:4px;text-transform:uppercase;color:var(--ink);opacity:0.28;margin-bottom:.8rem;}
.plan-title{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(2rem,4vw,3rem);line-height:1.1;color:var(--ink);margin-bottom:2rem;}
.plan-title em{font-style:italic;}

/* SCORE CARD */
.score-card{background:var(--white);border:1px solid var(--rule);padding:2rem 2.4rem;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2.4rem;max-width:780px;}
.score-left{max-width:520px;}
.score-label{font-size:0.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--ink);opacity:0.3;margin-bottom:.6rem;}
.score-summary{font-size:0.9rem;color:var(--ink);opacity:0.65;line-height:1.75;}
.score-right{text-align:right;flex-shrink:0;margin-left:2rem;}
.score-num{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:400;color:var(--ink);line-height:1;}
.score-denom{font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink);opacity:0.28;margin-top:.3rem;}

/* TABS */
.tabs-wrap{border-bottom:1px solid var(--rule);padding:0 4rem;}
.tabs{display:flex;gap:0;max-width:780px;}
.tab{padding:.9rem 1.4rem;font-size:0.65rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink);opacity:0.3;cursor:pointer;border:none;background:transparent;font-family:'Instrument Sans',sans-serif;border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;}
.tab:hover{opacity:.7;}
.tab.on{opacity:1;border-bottom-color:var(--ink);}

/* TAB CONTENT */
.tab-content{padding:3rem 4rem 5rem;}
.panel{display:none;max-width:780px;animation:rise .4s ease both;}
.panel.on{display:block;}

/* TYPOGRAPHY IN PANELS */
.panel h3{font-family:'Playfair Display',serif;font-weight:500;font-size:1rem;color:var(--ink);margin:1.8rem 0 .5rem;}
.panel h3:first-child{margin-top:0;}
.panel p{font-size:.85rem;color:var(--ink);opacity:.6;line-height:1.8;margin-bottom:.8rem;}
.panel ul{list-style:none;display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem;}
.panel ul li{font-size:.85rem;color:var(--ink);opacity:.6;line-height:1.7;padding-left:1rem;position:relative;}
.panel ul li::before{content:'—';position:absolute;left:0;opacity:.3;}

/* BUDGET BARS */
.budget-rows{display:flex;flex-direction:column;gap:0;border:1px solid var(--rule);margin-bottom:1.6rem;}
.b-row{display:flex;align-items:center;gap:1.2rem;padding:1rem 1.2rem;border-bottom:1px solid var(--rule);background:var(--white);}
.b-row:last-child{border-bottom:none;}
.b-name{font-size:.78rem;color:var(--ink);width:100px;flex-shrink:0;}
.b-bar{flex:1;height:2px;background:var(--rule);position:relative;}
.b-fill{position:absolute;top:0;left:0;height:100%;background:var(--ink);opacity:.25;}
.b-val{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--ink);width:60px;text-align:right;flex-shrink:0;}
.b-tag{font-size:.56rem;letter-spacing:1.5px;text-transform:uppercase;padding:.2rem .45rem;border:1px solid var(--rule);color:var(--ink);opacity:.4;flex-shrink:0;}
.b-tag.warn{border-color:#c8843a;color:#c8843a;opacity:1;}
.b-tag.good{border-color:#3a7d5f;color:#3a7d5f;opacity:1;}

/* GOAL ROWS */
.goal-rows{display:flex;flex-direction:column;gap:1px;background:var(--rule);border:1px solid var(--rule);margin-bottom:1.6rem;}
.g-row{background:var(--white);padding:1.2rem 1.4rem;display:flex;justify-content:space-between;align-items:center;}
.g-name{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--ink);}
.g-right{text-align:right;}
.g-timeline{font-size:.7rem;color:var(--ink);opacity:.4;}
.g-monthly{font-family:'Playfair Display',serif;font-size:1rem;color:var(--ink);}

/* ACTION PLAN */
.month-block{border:1px solid var(--rule);margin-bottom:1px;background:var(--white);}
.month-head{padding:1.1rem 1.4rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer;border:none;width:100%;text-align:left;background:transparent;font-family:'Instrument Sans',sans-serif;}
.month-head:hover{background:var(--soft);}
.month-name{font-family:'Playfair Display',serif;font-size:.95rem;color:var(--ink);}
.month-toggle{font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink);opacity:.3;}
.month-body{display:none;padding:0 1.4rem 1.4rem;border-top:1px solid var(--rule);}
.month-body.open{display:block;animation:rise .3s ease both;}
.month-item{font-size:.82rem;color:var(--ink);opacity:.6;line-height:1.7;padding:.4rem 0 .4rem 1rem;position:relative;border-bottom:1px solid var(--rule);}
.month-item:last-child{border-bottom:none;}
.month-item::before{content:'→';position:absolute;left:0;opacity:.25;}

/* CHAT */
.chat-wrap{display:flex;flex-direction:column;gap:0;max-width:780px;}
.chat-messages{display:flex;flex-direction:column;gap:1.4rem;margin-bottom:2rem;min-height:200px;}
.msg{max-width:88%;}
.msg.lumio{align-self:flex-start;}
.msg.user{align-self:flex-end;}
.msg-bubble{padding:1rem 1.2rem;font-size:.85rem;line-height:1.75;}
.msg.lumio .msg-bubble{background:var(--white);border:1px solid var(--rule);color:var(--ink);opacity:.8;font-family:'Playfair Display',serif;font-style:italic;}
.msg.user .msg-bubble{background:var(--ink);color:var(--bg);}
.msg-who{font-size:.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink);opacity:.28;margin-bottom:.4rem;}
.msg.user .msg-who{text-align:right;}

.chat-input-wrap{display:flex;gap:1px;background:var(--rule);border:1px solid var(--rule);}
.chat-input{flex:1;background:var(--white);border:none;padding:1rem 1.2rem;font-family:'Instrument Sans',sans-serif;font-size:.88rem;color:var(--ink);outline:none;}
.chat-input::placeholder{color:var(--ink);opacity:.25;}
.chat-send{background:var(--ink);color:var(--bg);border:none;padding:1rem 1.4rem;font-family:'Instrument Sans',sans-serif;font-size:.62rem;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;flex-shrink:0;}
.chat-send:hover{opacity:.75;}
.chat-typing{display:none;align-items:center;gap:.5rem;padding:.5rem 0;}
.chat-typing.show{display:flex;}
.t-dot{width:5px;height:5px;background:var(--ink);opacity:.25;border-radius:50%;animation:tdot 1.2s infinite;}
.t-dot:nth-child(2){animation-delay:.2s;}
.t-dot:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-5px);}}

@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:820px){
  .top{padding:1.3rem 1.5rem;}
  .plan-header,.tabs-wrap,.tab-content{padding-left:1.5rem;padding-right:1.5rem;}
  .tabs{overflow-x:auto;gap:0;}
  .tab{white-space:nowrap;padding:.8rem 1rem;}
  .score-card{flex-direction:column;gap:1.2rem;}
  .score-right{text-align:left;margin-left:0;}
}
</style>
</head>
<body>

<div class="top">
  <a class="logo" href="lumio-landing.html">Lumio</a>
  <div class="top-right">
    <button class="top-link" onclick="window.location.href='lumio-onboarding.html'">Retake</button>
    <button class="top-link primary">Upgrade to Premium</button>
  </div>
</div>

<!-- LOADING -->
<div class="loading-screen" id="loading-screen">
  <div class="spinner"></div>
  <span class="load-label">Building your plan</span>
  <span class="load-msg" id="load-msg">Analysing your finances...</span>
</div>

<!-- PLAN -->
<div class="plan" id="plan">

  <div class="plan-header">
    <p class="plan-eyebrow">Your financial plan</p>
    <h1 class="plan-title">Good morning, <em id="user-name">Marcus.</em></h1>
    <div class="score-card">
      <div class="score-left">
        <div class="score-label">Financial health</div>
        <p class="score-summary" id="score-summary">Loading...</p>
      </div>
      <div class="score-right">
        <div class="score-num" id="score-num">—</div>
        <div class="score-denom">out of 10</div>
      </div>
    </div>
  </div>

  <div class="tabs-wrap">
    <div class="tabs">
      <button class="tab on" onclick="switchTab('budget',this)">Budget</button>
      <button class="tab" onclick="switchTab('invest',this)">Investing</button>
      <button class="tab" onclick="switchTab('goals',this)">Goals</button>
      <button class="tab" onclick="switchTab('debt',this)">Debt</button>
      <button class="tab" onclick="switchTab('action',this)">Action Plan</button>
      <button class="tab" onclick="switchTab('chat',this)">Chat</button>
    </div>
  </div>

  <div class="tab-content">

    <!-- BUDGET -->
    <div class="panel on" id="panel-budget">
      <div class="budget-rows" id="budget-rows"></div>
      <div id="budget-advice"></div>
    </div>

    <!-- INVESTING -->
    <div class="panel" id="panel-invest">
      <div id="invest-content"></div>
    </div>

    <!-- GOALS -->
    <div class="panel" id="panel-goals">
      <div class="goal-rows" id="goal-rows"></div>
      <div id="goals-advice"></div>
    </div>

    <!-- DEBT -->
    <div class="panel" id="panel-debt">
      <div id="debt-content"></div>
    </div>

    <!-- ACTION PLAN -->
    <div class="panel" id="panel-action">
      <div id="action-content"></div>
    </div>

    <!-- CHAT -->
    <div class="panel" id="panel-chat">
      <div class="chat-wrap">
        <div class="chat-messages" id="chat-messages">
          <div class="msg lumio">
            <div class="msg-who">Lumio</div>
            <div class="msg-bubble" id="chat-intro">Ask me anything about your finances.</div>
          </div>
        </div>
        <div class="chat-typing" id="typing">
          <div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div>
        </div>
        <div class="chat-input-wrap">
          <input class="chat-input" id="chat-input" type="text" placeholder="Ask anything about your plan..." />
          <button class="chat-send" onclick="sendChat()">Send</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  // ── DEMO DATA (in production this comes from onboarding) ──
  const USER = {
    name: 'Marcus',
    age: 28,
    stage: 'Early career',
    income: 5200,
    savings: 8400,
    debt: 14000,
    debtType: 'Student loans',
    goals: ['Buy a home', 'Grow investments', 'Build emergency fund']
  };

  const LOAD_MSGS = [
    'Analysing your finances...',
    'Reviewing your spending patterns...',
    'Calculating your investment roadmap...',
    'Mapping your goals...',
    'Writing your personal plan...'
  ];

  // ── LOADING SEQUENCE ──
  let li = 0;
  const msgEl = document.getElementById('load-msg');
  const loadIv = setInterval(() => {
    li++;
    if (li < LOAD_MSGS.length) {
      msgEl.textContent = LOAD_MSGS[li];
    } else {
      clearInterval(loadIv);
      fetchPlan();
    }
  }, 900);

  // ── FETCH PLAN FROM CLAUDE ──
  async function fetchPlan() {
    const prompt = `You are Lumio, a personal financial advisor. Generate a complete financial plan for this person.

Profile: ${USER.name}, ${USER.age}, ${USER.stage}
Monthly income: $${USER.income}
Savings: $${USER.savings}
Debt: $${USER.debt} (${USER.debtType})
Goals: ${USER.goals.join(', ')}

Respond ONLY with a valid JSON object, no markdown, no explanation. Use this exact structure:
{
  "score": 7.2,
  "summary": "2-3 sentence personal summary addressing them by name",
  "budget": {
    "rows": [
      {"name":"Housing","amount":1400,"pct":70,"tag":""},
      {"name":"Food","amount":600,"pct":35,"tag":"warn"},
      {"name":"Transport","amount":320,"pct":20,"tag":""},
      {"name":"Savings","amount":520,"pct":30,"tag":"good"}
    ],
    "advice": "2-3 sentences of specific budget advice"
  },
  "invest": {
    "intro": "1-2 sentence intro",
    "steps": ["step 1","step 2","step 3","step 4"]
  },
  "goals": [
    {"name":"Buy a home","timeline":"4-5 years","monthly":"$640/mo"},
    {"name":"Grow investments","timeline":"Ongoing","monthly":"$300/mo"},
    {"name":"Build emergency fund","timeline":"8 months","monthly":"$450/mo"}
  ],
  "goalsAdvice": "1-2 sentences about their goals",
  "debt": {
    "hasDebt": true,
    "strategy": "2-3 sentences on exact debt payoff strategy with numbers",
    "timeline": "Debt-free in X months",
    "monthly": "$X/mo toward debt"
  },
  "action": {
    "month1": ["action 1","action 2","action 3"],
    "month2": ["action 1","action 2","action 3"],
    "month3": ["action 1","action 2","action 3"]
  },
  "chatIntro": "One warm sentence welcoming them and inviting questions"
}`;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      const data = await res.json();
      const raw = data.content.map(b => b.text || '').join('');
      const clean = raw.replace(/```json|```/g, '').trim();
      const plan = JSON.parse(clean);
      renderPlan(plan);
    } catch(e) {
      renderPlan(getDemoPlan());
    }
  }

  function getDemoPlan() {
    return {
      score: 7.2,
      summary: "Marcus, you're in a solid position for 28 — steady income, meaningful savings, and clear goals. Your student loan is manageable, and with a few focused adjustments you can accelerate significantly toward homeownership and financial independence.",
      budget: {
        rows: [
          {name:'Housing',amount:1400,pct:68,tag:''},
          {name:'Food',amount:680,pct:42,tag:'warn'},
          {name:'Transport',amount:320,pct:20,tag:'good'},
          {name:'Utilities',amount:180,pct:12,tag:'good'},
          {name:'Entertainment',amount:340,pct:22,tag:'warn'},
          {name:'Savings',amount:520,pct:32,tag:'good'}
        ],
        advice: "Your housing cost is reasonable at 27% of income — well within the 30% guideline. Food and entertainment are slightly elevated. Trimming those two categories by $200 combined would add $2,400 to your savings annually."
      },
      invest: {
        intro: "At 28 with a steady income, you have time on your side. The priority order is: eliminate high-interest debt first, then build tax-advantaged accounts before taxable investments.",
        steps: [
          "Contribute enough to your 401(k) to get the full employer match — this is a 100% instant return",
          "Open and max a Roth IRA ($7,000/year) — tax-free growth for the next 30+ years",
          "Once debt is cleared, increase 401(k) contributions toward the $23,000 annual limit",
          "Any remaining surplus goes into a low-cost index fund — VTI or VXUS in a taxable brokerage"
        ]
      },
      goals: [
        {name:'Buy a home',timeline:'4–5 years',monthly:'$640/mo'},
        {name:'Grow investments',timeline:'Ongoing',monthly:'$300/mo'},
        {name:'Build emergency fund',timeline:'7 months',monthly:'$450/mo'}
      ],
      goalsAdvice: "Your emergency fund should be the immediate priority — 3–6 months of expenses before aggressively investing. Once that's built, split surplus between your home down payment and investment accounts.",
      debt: {
        hasDebt: true,
        strategy: "Your $14,000 student loan should be attacked with the avalanche method — pay the minimum on all loans except the highest-interest one, which gets every extra dollar. At $650/month toward debt, you're debt-free in roughly 24 months.",
        timeline: "Debt-free in ~24 months",
        monthly: "$650/mo toward loans"
      },
      action: {
        month1: [
          "Log into your 401(k) and confirm you're getting the full employer match",
          "Open a Roth IRA if you don't have one (Fidelity or Vanguard take 10 minutes)",
          "Set up a $450/month automatic transfer to a high-yield savings account for your emergency fund"
        ],
        month2: [
          "Review your food and entertainment spending — identify two specific cuts",
          "Make one extra student loan payment using any savings from step above",
          "Research first-time homebuyer programs in your state — many offer grants or reduced rates"
        ],
        month3: [
          "Reassess your budget — is the $450/mo emergency fund transfer working?",
          "Begin contributing $300/month to a taxable brokerage in a total market index fund",
          "Calculate your exact home down payment target and open a dedicated savings account for it"
        ]
      },
      chatIntro: "Marcus, your plan is ready — ask me anything about your budget, investments, or next steps and I'll give you a specific answer based on your situation."
    };
  }

  function renderPlan(p) {
    document.getElementById('loading-screen').style.display = 'none';
    document.getElementById('user-name').textContent = USER.name + '.';
    document.getElementById('score-num').textContent = p.score.toFixed(1);
    document.getElementById('score-summary').textContent = p.summary;

    // Budget
    const bRows = p.budget.rows.map(r => `
      <div class="b-row">
        <span class="b-name">${r.name}</span>
        <div class="b-bar"><div class="b-fill" style="width:${r.pct}%"></div></div>
        <span class="b-val">$${r.amount.toLocaleString()}</span>
        ${r.tag ? `<span class="b-tag ${r.tag}">${r.tag === 'warn' ? 'Review' : 'Good'}</span>` : '<span style="width:52px"></span>'}
      </div>`).join('');
    document.getElementById('budget-rows').innerHTML = bRows;
    document.getElementById('budget-advice').innerHTML = `<p>${p.budget.advice}</p>`;

    // Invest
    document.getElementById('invest-content').innerHTML = `
      <p>${p.invest.intro}</p>
      <h3>Your roadmap</h3>
      <ul>${p.invest.steps.map(s => `<li>${s}</li>`).join('')}</ul>`;

    // Goals
    const gRows = p.goals.map(g => `
      <div class="g-row">
        <span class="g-name">${g.name}</span>
        <div class="g-right">
          <div class="g-monthly">${g.monthly}</div>
          <div class="g-timeline">${g.timeline}</div>
        </div>
      </div>`).join('');
    document.getElementById('goal-rows').innerHTML = gRows;
    document.getElementById('goals-advice').innerHTML = `<p>${p.goalsAdvice}</p>`;

    // Debt
    document.getElementById('debt-content').innerHTML = p.debt.hasDebt ? `
      <h3>Your strategy</h3>
      <p>${p.debt.strategy}</p>
      <div class="budget-rows" style="margin-top:1.2rem">
        <div class="b-row"><span class="b-name">Timeline</span><span style="flex:1"></span><span class="b-val" style="width:auto">${p.debt.timeline}</span></div>
        <div class="b-row"><span class="b-name">Monthly</span><span style="flex:1"></span><span class="b-val" style="width:auto">${p.debt.monthly}</span></div>
      </div>` :
      `<p>You have no debt — this is a meaningful strength. Keep it that way by building your emergency fund before taking on any new credit obligations.</p>`;

    // Action plan
    const months = [
      {label:'Month 1', items: p.action.month1},
      {label:'Month 2', items: p.action.month2},
      {label:'Month 3', items: p.action.month3}
    ];
    document.getElementById('action-content').innerHTML = months.map((m,i) => `
      <div class="month-block">
        <button class="month-head" onclick="toggleMonth(this)">
          <span class="month-name">${m.label}</span>
          <span class="month-toggle">${i===0?'Collapse':'Expand'}</span>
        </button>
        <div class="month-body ${i===0?'open':''}">
          ${m.items.map(it => `<div class="month-item">${it}</div>`).join('')}
        </div>
      </div>`).join('');

    // Chat
    document.getElementById('chat-intro').textContent = p.chatIntro;

    // Store plan for chat context
    window.PLAN_CONTEXT = JSON.stringify(p);

    document.getElementById('plan').classList.add('show');
  }

  // ── TABS ──
  function switchTab(id, el) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
    el.classList.add('on');
    document.getElementById('panel-' + id).classList.add('on');
  }

  // ── ACTION PLAN ACCORDION ──
  function toggleMonth(btn) {
    const body = btn.nextElementSibling;
    const tog = btn.querySelector('.month-toggle');
    const open = body.classList.toggle('open');
    tog.textContent = open ? 'Collapse' : 'Expand';
  }

  // ── CHAT ──
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') sendChat();
  });

  async function sendChat() {
    const input = document.getElementById('chat-input');
    const q = input.value.trim();
    if (!q) return;
    input.value = '';

    appendMsg(q, 'user');
    document.getElementById('typing').classList.add('show');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `You are Lumio, a personal financial advisor. Here is the user's financial plan: ${window.PLAN_CONTEXT || ''}. Answer this question in 2-4 sentences, directly and specifically. Question: ${q}`
          }]
        })
      });
      const data = await res.json();
      const reply = data.content.map(b => b.text || '').join('').trim();
      document.getElementById('typing').classList.remove('show');
      appendMsg(reply, 'lumio');
    } catch {
      document.getElementById('typing').classList.remove('show');
      appendMsg("I'm having trouble connecting right now. Please try again in a moment.", 'lumio');
    }
  }

  function appendMsg(text, who) {
    const wrap = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    div.innerHTML = `<div class="msg-who">${who === 'lumio' ? 'Lumio' : 'You'}</div><div class="msg-bubble">${text}</div>`;
    wrap.appendChild(div);
    div.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
</script>
</body>
</html>
