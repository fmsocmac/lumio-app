<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lumio — Surplus</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Instrument+Sans:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#0e0d0c;--bg:#fdfaf5;--white:#ffffff;--rule:#e8e3db;--soft:#f5f1eb;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font-family:'Instrument Sans',sans-serif;font-weight:300;min-height:100vh;}
.top{padding:1.6rem 4rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--rule);position:sticky;top:0;background:rgba(253,250,245,0.96);backdrop-filter:blur(12px);z-index:10;}
.logo{font-family:'Playfair Display',serif;font-size:1.25rem;font-weight:500;color:var(--ink);text-decoration:none;}
.back{font-size:0.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink);opacity:0.3;text-decoration:none;transition:opacity .2s;}
.back:hover{opacity:1;}
.main{max-width:780px;padding:3.5rem 4rem 6rem;}
.eyebrow{font-size:0.58rem;letter-spacing:4px;text-transform:uppercase;color:var(--ink);opacity:0.28;margin-bottom:.8rem;}
.page-title{font-family:'Playfair Display',serif;font-weight:400;font-size:clamp(2rem,4vw,2.8rem);line-height:1.1;color:var(--ink);margin-bottom:2.4rem;}
.page-title em{font-style:italic;}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--rule);border:1px solid var(--rule);margin-bottom:2.4rem;}
.stat{background:var(--white);padding:1.4rem 1.2rem;}
.stat-label{font-size:0.57rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink);opacity:0.3;margin-bottom:.5rem;}
.stat-val{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:400;color:var(--ink);}
.stat-val.pos{color:#3a7d5f;}
.stat-val.neg{color:#9b2335;}
.sec-label{font-size:0.58rem;letter-spacing:4px;text-transform:uppercase;color:var(--ink);opacity:0.28;margin-bottom:1rem;}
.bar-rows{display:flex;flex-direction:column;gap:1px;background:var(--rule);border:1px solid var(--rule);margin-bottom:2.4rem;}
.b-row{background:var(--white);padding:1rem 1.2rem;display:flex;align-items:center;gap:1.2rem;}
.b-name{font-size:.78rem;color:var(--ink);width:110px;flex-shrink:0;}
.b-bar{flex:1;height:2px;background:var(--rule);position:relative;}
.b-fill{position:absolute;top:0;left:0;height:100%;background:var(--ink);opacity:.2;}
.b-fill.pos{background:#3a7d5f;opacity:.5;}
.b-fill.neg{background:#9b2335;opacity:.4;}
.b-val{font-family:'Playfair Display',serif;font-size:.88rem;color:var(--ink);width:70px;text-align:right;flex-shrink:0;}
.month-toggle{display:flex;gap:0;border:1px solid var(--rule);margin-bottom:1.4rem;width:fit-content;}
.mt{padding:.4rem .9rem;font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink);opacity:.3;cursor:pointer;background:transparent;border:none;font-family:'Instrument Sans',sans-serif;border-right:1px solid var(--rule);transition:all .15s;}
.mt:last-child{border-right:none;}
.mt.on{background:var(--ink);color:var(--bg);opacity:1;}
.insight{background:var(--white);border:1px solid var(--rule);padding:1.4rem 1.6rem;margin-bottom:2rem;}
.insight-label{font-size:.57rem;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink);opacity:.28;margin-bottom:.5rem;}
.insight-text{font-family:'Playfair Display',serif;font-style:italic;font-size:.95rem;color:var(--ink);opacity:.7;line-height:1.65;}
@keyframes rise{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade{animation:rise .5s ease both;}
@media(max-width:820px){.top,.main{padding-left:1.5rem;padding-right:1.5rem;}.stat-row{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div class="top">
  <a class="logo" href="lumio-landing.html">Lumio</a>
  <a class="back" href="lumio-dashboard.html">← Dashboard</a>
</div>
<div class="main">
  <p class="eyebrow fade">Monthly surplus</p>
  <h1 class="page-title fade">Income vs<br/><em>expenses.</em></h1>
  <div class="stat-row fade">
    <div class="stat"><div class="stat-label">Income</div><div class="stat-val">$5,200</div></div>
    <div class="stat"><div class="stat-label">Expenses</div><div class="stat-val">$4,560</div></div>
    <div class="stat"><div class="stat-label">Surplus</div><div class="stat-val pos">+$640</div></div>
  </div>
  <p class="sec-label fade">Month</p>
  <div class="month-toggle fade">
    <button class="mt" onclick="setMonth('jan',this)">Jan</button>
    <button class="mt" onclick="setMonth('feb',this)">Feb</button>
    <button class="mt" onclick="setMonth('mar',this)">Mar</button>
    <button class="mt on" onclick="setMonth('apr',this)">Apr</button>
  </div>
  <p class="sec-label fade">Breakdown</p>
  <div class="bar-rows fade" id="bar-rows"></div>
  <div class="insight fade">
    <div class="insight-label">Lumio insight</div>
    <p class="insight-text" id="insight-text">Your surplus has grown $180 since January. Cutting entertainment by $100 would add $1,200 to your savings this year.</p>
  </div>
</div>
<script>
const data = {
  jan:{income:5200,rows:[{n:'Housing',v:1400,pct:68},{n:'Food',v:720,pct:44,warn:true},{n:'Transport',v:340,pct:21},{n:'Utilities',v:190,pct:12},{n:'Entertainment',v:410,pct:25,warn:true},{n:'Health',v:80,pct:5},{n:'Other',v:220,pct:14}],surplus:460,insight:'January was a tighter month — entertainment spending was elevated at $410.'},
  feb:{income:5200,rows:[{n:'Housing',v:1400,pct:68},{n:'Food',v:680,pct:42},{n:'Transport',v:320,pct:20},{n:'Utilities',v:185,pct:11},{n:'Entertainment',v:360,pct:22},{n:'Health',v:80,pct:5},{n:'Other',v:175,pct:11}],surplus:540,insight:'February showed improvement — food and entertainment both came down noticeably.'},
  mar:{income:5200,rows:[{n:'Housing',v:1400,pct:68},{n:'Food',v:640,pct:39},{n:'Transport',v:310,pct:19},{n:'Utilities',v:180,pct:11},{n:'Entertainment',v:320,pct:20},{n:'Health',v:80,pct:5},{n:'Other',v:160,pct:10}],surplus:560,insight:'March was your best month yet — consistent improvement across food and entertainment.'},
  apr:{income:5200,rows:[{n:'Housing',v:1400,pct:68},{n:'Food',v:680,pct:42},{n:'Transport',v:320,pct:20},{n:'Utilities',v:180,pct:11},{n:'Entertainment',v:340,pct:21},{n:'Health',v:80,pct:5},{n:'Other',v:160,pct:10}],surplus:640,insight:'Your surplus has grown $180 since January. Cutting entertainment by $100 would add $1,200 to your savings this year.'}
};
function setMonth(m,el){
  document.querySelectorAll('.mt').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  const d=data[m];
  document.getElementById('bar-rows').innerHTML=d.rows.map(r=>`<div class="b-row"><span class="b-name">${r.n}</span><div class="b-bar"><div class="b-fill${r.warn?' neg':''}" style="width:${r.pct}%"></div></div><span class="b-val">$${r.v.toLocaleString()}</span></div>`).join('');
  document.getElementById('insight-text').textContent=d.insight;
}
setMonth('apr',document.querySelector('.mt.on'));
</script>
</body>
</html>
